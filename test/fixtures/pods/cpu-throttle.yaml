# CPUThrottling scenario
# ──────────────────────────────────────────────────────────────────────────────
# Expected watcher signal : CPUThrottlingEvent
#                           (K8s Event reason=CPUThrottlingHigh)
# Expected incident type  : ResourceSaturation  (severity P3)
# Detected by             : EventWatcher.handleCPUThrottling()
# Detection method        : InvolvedObject.FieldPath "spec.containers{throttle-demo}"
#
# ⚠  Kubernetes ≥ 1.28 compatibility note:
#   The kubelet stopped emitting CPUThrottlingHigh events natively in K8s 1.28
#   (deprecated 1.23, removed 1.28).  On K8s ≥ 1.28 the container IS heavily
#   throttled (the busy-loop proves it) but no K8s Event is generated.
#
#   Recommended demo flow on K8s ≥ 1.28:
#     1. Apply this Deployment to get a genuinely throttled pod running
#     2. Run the simulator — it resolves the pod from the Deployment automatically
#          ./test/fixtures/pods/simulate-cpu-throttle.sh
#     The EventWatcher processes synthetic and real events identically.
#
#   On K8s ≤ 1.27 the kubelet emits events natively — no script needed.
#
# Apply:
#   kubectl apply -f test/fixtures/pods/cpu-throttle.yaml
#
# Inject synthetic event (K8s ≥ 1.28):
#   ./test/fixtures/pods/simulate-cpu-throttle.sh
#
# Watch K8s events for the throttling signal:
#   kubectl get events -n development --field-selector reason=CPUThrottlingHigh -w
#
# Watch IncidentReports:
#   kubectl get incidentreports -n development -w
#
# Clean up:
#   kubectl delete deploy cpu-throttle-demo -n development
#   kubectl delete incidentreports -n development -l rca.rca-operator.tech/incident-type=ResourceSaturation
# ──────────────────────────────────────────────────────────────────────────────

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: cpu-throttle-demo
  namespace: development
  labels:
    app: cpu-throttle-demo
    rca.rca-operator.tech/fixture: "true"
    rca.rca-operator.tech/scenario: cpu-throttling
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cpu-throttle-demo
  template:
    metadata:
      labels:
        app: cpu-throttle-demo
        rca.rca-operator.tech/fixture: "true"
        rca.rca-operator.tech/scenario: cpu-throttling
    spec:
      containers:
      - name: throttle-demo
        image: busybox:1.36
        resources:
          requests:
            cpu: 10m
            memory: 8Mi
          limits:
            cpu: 10m
            memory: 16Mi
        command:
          - /bin/sh
          - -c
          - |
            echo "CPU throttle demo: starting busy-loop with 10m CPU limit"
            echo "The CFS scheduler will throttle this container heavily."
            echo ""
            echo "On K8s >= 1.28, inject the event manually:"
            echo "  ./test/fixtures/pods/simulate-cpu-throttle.sh"
            echo ""
            i=0
            while true; do
              i=$((i + 1))
              if [ $((i % 500000)) -eq 0 ]; then
                echo "iterations: $i (container is being throttled by CFS)"
              fi
            done