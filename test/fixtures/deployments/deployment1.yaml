# StalledRollout scenario
# ─────────────────────────────────────────────────────────────────────────────
# Expected watcher signal : StalledRolloutEvent (Progressing=False / ProgressDeadlineExceeded)
# Expected incident type  : BadDeploy  (severity P2)
# Detected by             : DeploymentWatcher.detectStalledRollout()
# Detection method        : Kubernetes sets Progressing condition Status=False,
#                           Reason=ProgressDeadlineExceeded after progressDeadlineSeconds
#
# What happens:
#   1. This Deployment references a non-existent image.
#   2. All pods enter ImagePullBackOff and never become Ready.
#   3. After progressDeadlineSeconds (60 s) Kubernetes sets:
#        status.conditions:
#        - type: Progressing
#          status: "False"
#          reason: ProgressDeadlineExceeded
#   4. The DeploymentWatcher detects this condition and emits StalledRolloutEvent.
#   5. The correlator creates a BadDeploy IncidentReport with severity P2.
#
# Resolution is manual for this fixture — delete the Deployment or update it to
# use a valid image; the in-memory dedup gate resets on the next watcher restart.
#
# Apply:
#   kubectl apply -f test/fixtures/deployments/deployment1.yaml
#
# Watch (in another terminal):
#   kubectl get incidentreports -n development -w
#
# Verify the condition is set:
#   kubectl get deploy payment-service -n development \
#     -o jsonpath='{.status.conditions[?(@.type=="Progressing")]}'
#
# Clean up:
#   kubectl delete -f test/fixtures/deployments/deployment1.yaml
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: development
  labels:
    app: payment-service
    rca.rca-operator.io/fixture: "true"
    rca.rca-operator.io/scenario: stalled-rollout
spec:
  replicas: 3
  # Short deadline so the stall is detected quickly in a demo / CI environment.
  # Kubernetes default is 600 s; 60 s is enough to observe the incident within a minute.
  progressDeadlineSeconds: 60
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
        rca.rca-operator.io/fixture: "true"
    spec:
      containers:
      - name: app
        image: myregistry.io/payment-service:nonexistent-sha256
        imagePullPolicy: Always
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 50m
            memory: 32Mi
