                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              correlatedSignals:
                description: |-
                  correlatedSignals is the list of raw signals that triggered this incident
                  (e.g. "CrashLoopBackOff (restarts: 8)", "OOMKilled (exit code 137)").
                items:
                  type: string
                type: array
                x-kubernetes-list-type: atomic
              firstObservedAt:
                description: firstObservedAt is when the incident fingerprint was
                  first seen in the current lifecycle.
                format: date-time
                type: string
              incidentType:
                description: incidentType is the category of incident detected by
                  the correlator.
                enum:
                - CrashLoop
                - OOM
                - BadDeploy
                - NodeFailure
                - Registry
                - GracePeriodViolation
                - ProbeFailure
                - ResourceSaturation
                type: string
              lastObservedAt:
                description: lastObservedAt is when the most recent confirming signal
                  was received.
                format: date-time
                type: string
              message:
                description: message is the detailed message for the most recent signal.
                type: string
              notified:
                description: |-
                  notified indicates whether the notification layer (Slack / PagerDuty) has
                  already fired for this incident. Used to suppress duplicate alerts.
