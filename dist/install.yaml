              phase:
                description: phase is the current lifecycle phase of the incident.
                enum:
                - Detecting
                - Active
                - Resolved
                type: string
              reason:
                description: reason is the machine-oriented Kubernetes reason when
                  available.
                type: string
              resolvedAt:
                description: resolvedAt is when the incident was resolved.
                format: date-time
                type: string
              resolvedTime:
                description: |-
                  resolvedTime is when the incident was resolved. Empty while still active.
                  Deprecated: use resolvedAt. Retained only for compatibility with older clients.
                format: date-time
                type: string
              severity:
                description: severity is the incident severity level assigned by the
                  correlator.
                enum:
                - P1
                - P2
                - P3
                - P4
                type: string
              signalCount:
                description: signalCount is the number of confirming signals recorded
                  in the current lifecycle.
                format: int64
                type: integer
              stabilizationWindowSeconds:
                description: stabilizationWindowSeconds is the required continuous
                  observation window before Active.
                format: int64
                type: integer
              startTime:
                description: |-
                  startTime is when the incident was first detected.
                  Deprecated: use firstObservedAt. Retained only for compatibility with older clients.
                format: date-time
                type: string
              summary:
                description: summary is the short dashboard-friendly summary for the
                  current incident state.
                type: string
              timeline:
                description: timeline is the ordered sequence of events that make
                  up this incident.
                items:
                  description: TimelineEvent is a single timestamped entry in the
                    incident timeline.
                  properties:
                    event:
                      description: event is a human-readable description of what happened.
                      type: string
                    time:
                      description: time is the wall-clock time of the event (RFC3339).
                      format: date-time
                      type: string
                  required:
                  - event
                  - time
                  type: object
                type: array
                x-kubernetes-list-type: atomic
