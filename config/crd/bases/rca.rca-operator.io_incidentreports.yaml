  name: incidentreports.rca.rca-operator.io
spec:
  group: rca.rca-operator.io
  names:
    kind: IncidentReport
    listKind: IncidentReportList
    plural: incidentreports
    singular: incidentreport
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Incident severity
      jsonPath: .status.severity
      name: Severity
      type: string
    - description: Lifecycle phase
      jsonPath: .status.phase
      name: Phase
      type: string
    - description: Incident type
