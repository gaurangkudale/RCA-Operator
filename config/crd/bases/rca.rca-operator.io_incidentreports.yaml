                  type: string
                type: array
                x-kubernetes-list-type: atomic
              incidentType:
                description: incidentType is the category of incident detected by
                  the correlator.
                enum:
                - CrashLoop
                - OOM
                - BadDeploy
                - NodeFailure
                - Registry
                - GracePeriodViolation
                - ProbeFailure
                type: string
              notified:
