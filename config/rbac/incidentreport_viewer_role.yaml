# This rule is not used by the project rca-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to rca.rca-operator.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: rca-operator
    app.kubernetes.io/managed-by: kustomize
  name: incidentreport-viewer-role
rules:
- apiGroups:
  - rca.rca-operator.io
  resources:
  - incidentreports
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - rca.rca-operator.io
  resources:
  - incidentreports/status
  verbs:
  - get
