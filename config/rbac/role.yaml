---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - get
  - list
  - patch
  - watch
- apiGroups:
  - ""
  resources:
  - namespaces
  - nodes
  - pods
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - rca.rca-operator.tech
  resources:
  - incidentreports
  - rcaagents
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - rca.rca-operator.tech
  resources:
  - incidentreports/finalizers
  - rcaagents/finalizers
  verbs:
  - update
- apiGroups:
  - rca.rca-operator.tech
  resources:
  - incidentreports/status
  - rcaagents/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - rca.rca-operator.tech
  resources:
  - rcacorrelationrules
  verbs:
  - create
  - delete
  - get
  - list
  - update
  - watch
- apiGroups:
  - rca.rca-operator.tech
  resources:
  - rcacorrelationrules/status
  verbs:
  - get
