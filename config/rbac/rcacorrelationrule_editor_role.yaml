# This rule is not used by the project rca-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the rca.rca-operator.tech.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: rca-operator
    app.kubernetes.io/managed-by: kustomize
  name: rcacorrelationrule-editor-role
rules:
- apiGroups:
  - rca.rca-operator.tech
  resources:
  - rcacorrelationrules
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - rca.rca-operator.tech
  resources:
  - rcacorrelationrules/status
  verbs:
  - get
