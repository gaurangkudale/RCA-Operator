apiVersion: rca.rca-operator.tech/v1alpha1
kind: RCACorrelationRule
metadata:
  name: crashloop-plus-deploy
spec:
  priority: 300
  trigger:
    eventType: CrashLoopBackOff
  conditions:
    - eventType: StalledRollout
      scope: sameNamespace
  fires:
    incidentType: StalledRollout
    severity: P2
    summary: "StalledRollout: CrashLoopBackOff with stalled rollout in {{.Namespace}}"
    resource: deployment
    scope: Workload
