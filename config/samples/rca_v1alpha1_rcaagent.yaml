apiVersion: rca.rca-operator.io/v1alpha1
kind: RCAAgent
metadata:
  name: rcaagent-sample
  namespace: development
spec:
  watchNamespaces:
    - development
  aiProviderConfig:
    type: openai
    model: gpt-4o
    secretRef: rca-agent-openai-secret
  notifications:
    slack:
      webhookSecretRef: slack-webhook
      channel: "#incidents"
      mentionOnP1: "@oncall"
    pagerduty:
      secretRef: pd-api-key
      severity: P2         # minimum severity to page
  incidentRetentionDays: 30
---
apiVersion: rca.rca-operator.io/v1alpha1
kind: RCAAgent
metadata:
  name: rcaagent-development
  namespace: development
spec:
  watchNamespaces:
    - default
  aiProviderConfig:
    type: openai
    model: gpt-4o
    secretRef: rca-agent-openai-secret
  notifications:
    slack:
      webhookSecretRef: slack-webhook
      channel: "#incidents"
      mentionOnP1: "@sre-oncall"
    pagerduty:
      secretRef: pd-api-key
      severity: P2         # minimum severity to page
  incidentRetentionDays: 30
