apiVersion: rca.rca-operator.io/v1alpha1
kind: RCAAgent
metadata:
  name: rcaagent-sample
  namespace: rca-operator-system
spec:
  watchNamespaces:
    - development
  aiProviderConfig:
    type: openai
    model: gpt-4o
    secretRef: rca-agent-openai-secret
---
apiVersion: rca.rca-operator.io/v1alpha1
kind: RCAAgent
metadata:
  name: rcaagent-development
  namespace: development
spec:
  watchNamespaces:
    - default
  aiProviderConfig:
    type: openai
    model: gpt-4o
    secretRef: rca-agent-openai-secret
