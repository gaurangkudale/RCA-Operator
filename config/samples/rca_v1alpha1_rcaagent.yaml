apiVersion: rca.rca-operator.io/v1alpha1
kind: RCAAgent
metadata:
  name: rcaagent-sample
  namespace: development
spec:
  watchNamespaces:
    - development
  aiProviderConfig:
    type: openai
    model: gpt-4o
    secretRef: rca-agent-openai-secret
  notifications:
    slack:
      webhookSecretRef: slack-webhook
      channel: "#incidents"
      mentionOnP1: "@oncall"
    pagerduty:
      secretRef: pd-api-key
      severity: P2         # minimum severity to page
  incidentRetention: 5m
---
apiVersion: rca.rca-operator.io/v1alpha1
kind: RCAAgent
metadata:
  name: rcaagent-development
  namespace: development
spec:
  watchNamespaces:
    - default
  aiProviderConfig:
    type: openai
    model: gpt-4o
    secretRef: rca-agent-openai-secret
  notifications:
    slack:
      webhookSecretRef: slack-webhook
      channel: "#incidents"
      mentionOnP1: "@sre-oncall"
    pagerduty:
      secretRef: pd-api-key
      severity: P2         # minimum severity to page
  incidentRetention: 5m
---
apiVersion: v1
kind: Pod
metadata:
  name: bad-image-demo
  namespace: development
  labels:
    app: bad-image-demo
spec:
  restartPolicy: Always
  containers:
  - name: bad-image-container
    image: busybox
    command:
      - /bin/sh
      - -c
      - echo "This container should never start because the image tag is invalid" && sleep 36000
---
apiVersion: v1
kind: Pod
metadata:
  name: retention-crashloop-demo
  namespace: default
  labels:
    app: retention-crashloop-demo
spec:
  restartPolicy: Always
  volumes:
  - name: state
    emptyDir: {}
  containers:
  - name: app
    image: busybox
    volumeMounts:
    - name: state
      mountPath: /state
    command:
      - /bin/sh
      - -c
      - |
        COUNT_FILE=/state/restart-count
        COUNT=0

        if [ -f "$COUNT_FILE" ]; then
          COUNT=$(cat "$COUNT_FILE")
        fi

        COUNT=$((COUNT+1))
        echo "$COUNT" > "$COUNT_FILE"
        echo "Retention test start attempt: $COUNT"

        # Fail fast on first attempts so CrashLoopBackOff incident is created.
        if [ "$COUNT" -le 4 ]; then
          echo "Intentional crash for retention test"
          sleep 2
          exit 1
        fi

        # Then stay healthy long enough for:
        # 1) PodHealthy signal (ready stability window) and incident resolution
        # 2) retention window (incidentRetention: 5m) cleanup to run
        echo "Recovery phase: staying healthy"
        sleep 1800
---
## ExitCode demo (optional): uncomment to verify incidentType=ExitCode.
## Expected signal: exitCode=127 category=CommandNotFound
apiVersion: v1
kind: Pod
metadata:
  name: exitcode-demo
  namespace: development
  labels:
    app: exitcode-demo
spec:
  restartPolicy: Always
  containers:
  - name: app
    image: busybox
    command:
      - /bin/sh
      - -c
      - |
        echo "Intentional non-zero exit for ExitCode incident"
        # 127 = command not found
        /definitely-not-a-real-command
        exit 127
---
## GracePeriodViolation demo (optional): uncomment to verify incidentType=GracePeriodViolation.
## Trigger:
##   kubectl delete pod -n development grace-violation-demo
## The preStop hook sleeps longer than terminationGracePeriodSeconds to create an overdue
## termination window while the container is still running.
apiVersion: v1
kind: Pod
metadata:
  name: grace-violation-demo
  namespace: development
  labels:
    app: grace-violation-demo
spec:
  restartPolicy: Always
  terminationGracePeriodSeconds: 5
  containers:
  - name: app
    image: busybox
    lifecycle:
      preStop:
        exec:
          command:
            - /bin/sh
            - -c
            - sleep 45
    command:
      - /bin/sh
      - -c
      - |
        echo "Running until deleted"
        while true; do
          sleep 10
        done
---
apiVersion: v1
kind: Pod
metadata:
  name: oomkill-demo
  namespace: development
  labels:
    app: oomkill-demo
spec:
  restartPolicy: Always
  volumes:
  - name: state
    emptyDir: {}
  containers:
  - name: memory-hog
    image: python:3.12-alpine
    volumeMounts:
    - name: state
      mountPath: /state
    resources:
      requests:
        memory: "512Mi"
        cpu: "200m"
      limits:
        memory: "512Mi"
        cpu: "200m"
    command:
      - /bin/sh
      - -c
      - |
        COUNT_FILE=/state/restart-count
        COUNT=0

        if [ -f "$COUNT_FILE" ]; then
          COUNT=$(cat "$COUNT_FILE")
        fi

        COUNT=$((COUNT+1))
        echo "$COUNT" > "$COUNT_FILE"
        echo "OOM test start attempt: $COUNT"

        # Force real OOMKills on the first few restarts so the watcher emits OOM events.
        if [ "$COUNT" -le 3 ]; then
          echo "Intentional OOM attempt"
          python -c 'exec("chunks=[]\nwhile True:\n    chunks.append(\"X\" * (32 * 1024 * 1024) + str(len(chunks)))")'
        fi

        # Then stay healthy long enough for:
        # 1) PodHealthy signal after ready stability window
        # 2) OOM incident auto-resolution
        echo "Recovery phase: staying healthy"
        sleep 1800