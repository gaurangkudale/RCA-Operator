apiVersion: rca.rca-operator.io/v1alpha1
kind: RCAAgent
metadata:
  name: rcaagent-sample
  namespace: development
spec:
  watchNamespaces:
    - development
  aiProviderConfig:
    type: openai
    model: gpt-4o
    secretRef: rca-agent-openai-secret
  notifications:
    slack:
      webhookSecretRef: slack-webhook
      channel: "#incidents"
      mentionOnP1: "@oncall"
    pagerduty:
      secretRef: pd-api-key
      severity: P2         # minimum severity to page
  incidentRetentionDays: 30
---
apiVersion: rca.rca-operator.io/v1alpha1
kind: RCAAgent
metadata:
  name: rcaagent-development
  namespace: development
spec:
  watchNamespaces:
    - default
  aiProviderConfig:
    type: openai
    model: gpt-4o
    secretRef: rca-agent-openai-secret
  notifications:
    slack:
      webhookSecretRef: slack-webhook
      channel: "#incidents"
      mentionOnP1: "@sre-oncall"
    pagerduty:
      secretRef: pd-api-key
      severity: P2         # minimum severity to page
  incidentRetentionDays: 30
---
apiVersion: v1
kind: Pod
metadata:
  name: flaky-app-demo
  namespace: development
  labels:
    app: flaky-app-demo
spec:
  restartPolicy: Always
  containers:
  - name: flaky-container
    image: busybox
    command:
      - /bin/sh
      - -c
      - |
        COUNT_FILE=/tmp/crashcount
        COUNT=0

        if [ -f $COUNT_FILE ]; then
          COUNT=$(cat $COUNT_FILE)
        fi

        COUNT=$((COUNT+1))
        echo $COUNT > $COUNT_FILE

        echo "Container start attempt: $COUNT"

        # First 5 runs -> crash
        if [ $COUNT -le 5 ]; then
          echo "Simulating crash..."
          sleep 5000
          exit 1
        fi

        # After that -> run stable for 3 minutes
        if [ $COUNT -eq 6 ]; then
          echo "System stabilized. Running normally for 3 minutes..."
          sleep 18000
          exit 0
        fi

        # After stability -> start crashing again
        echo "System unstable again..."
        sleep 5000
        exit 1