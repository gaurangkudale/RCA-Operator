name: Release Helm Charts

on:
  push:
    tags:
      - 'v*'
    branches:
      - main-gk
    paths:
      - 'helm/**'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v4.0.4

      - name: Get chart version
        id: chart_version
        run: |
          VERSION=$(grep '^version:' helm/Chart.yaml | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Chart version: $VERSION"

      - name: Package Helm chart
        run: |
          helm package helm/ -d .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: helm-v${{ steps.chart_version.outputs.version }}
          name: Helm Chart v${{ steps.chart_version.outputs.version }}
          body: |
            ## Helm Chart Release

            Install with:
            ```bash
            helm install rca-operator https://github.com/${{ github.repository }}/releases/download/helm-v${{ steps.chart_version.outputs.version }}/rca-operator-${{ steps.chart_version.outputs.version }}.tgz
            ```
          files: |
            rca-operator-*.tgz
          fail_on_unmatched_files: true
