name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  packages: write
  pages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      # ── Extract versions ──────────────────────────────────────────
      - name: Extract versions
        id: versions
        run: |
          CHART_VERSION=$(grep '^version:' helm/Chart.yaml | awk '{print $2}')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "chart_version=$CHART_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_version=$TAG_VERSION"     >> "$GITHUB_OUTPUT"
          echo "Chart version: $CHART_VERSION  Tag version: $TAG_VERSION"

      # ── Docker image ──────────────────────────────────────────────
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # ── Installation manifests ────────────────────────────────────
      - name: Generate installation manifests
        run: |
          IMG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
          make build-installer IMG=${IMG,,}
          make build-crds

      # ── Helm chart package ────────────────────────────────────────
      - name: Package Helm chart
        run: |
          helm package helm/ -d dist/

      # ── GitHub Release ────────────────────────────────────────────
      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --latest \
            dist/install.yaml \
            dist/crds.yaml \
            dist/rca-operator-${{ steps.versions.outputs.chart_version }}.tgz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Helm repo on gh-pages branch ──────────────────────────────
      - name: Publish Helm chart to GitHub Pages
        run: |
          set -e

          CHART_TGZ="dist/rca-operator-${{ steps.versions.outputs.chart_version }}.tgz"
          REPO_URL="https://${{ github.repository_owner }}.github.io/$(echo '${{ github.repository }}' | cut -d/ -f2)"

          # Clone gh-pages branch (or create it)
          git clone --single-branch --branch gh-pages \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            /tmp/gh-pages 2>/dev/null || {
              mkdir -p /tmp/gh-pages
              cd /tmp/gh-pages
              git init
              git checkout --orphan gh-pages
              git commit --allow-empty -m "Initialize gh-pages"
              cd -
            }

          # Copy chart and rebuild index
          mkdir -p /tmp/gh-pages/charts
          cp "$CHART_TGZ" /tmp/gh-pages/charts/

          # Merge with existing index if present
          if [ -f /tmp/gh-pages/index.yaml ]; then
            helm repo index /tmp/gh-pages/charts \
              --url "$REPO_URL/charts" \
              --merge /tmp/gh-pages/index.yaml
          else
            helm repo index /tmp/gh-pages/charts \
              --url "$REPO_URL/charts"
          fi
          cp /tmp/gh-pages/charts/index.yaml /tmp/gh-pages/index.yaml

          # Push
          cd /tmp/gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && echo "No chart changes" && exit 0
          git commit -m "Release Helm chart v${{ steps.versions.outputs.chart_version }}"
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
