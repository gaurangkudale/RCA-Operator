name: Helm Validation

on:
  pull_request:
    paths:
      - "helm/**"
      - ".github/workflows/helm-validate.yml"

jobs:
  lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Lint Helm chart
        run: helm lint ./helm

  template:
    name: Helm Template Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Template validation
        run: |
          helm template rca-operator ./helm > /tmp/helm-release.yaml
          if [ ! -s /tmp/helm-release.yaml ]; then
            echo "Error: Helm template generated empty manifest"
            exit 1
          fi
          echo "✓ Helm template validation passed"
          echo "Generated manifest preview:"
          head -30 /tmp/helm-release.yaml

  chart-version:
    name: Chart Version Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get base Chart.yaml version
        id: base_version
        run: |
          git fetch origin ${{ github.base_ref }}
          BASE_VERSION=$(git show origin/${{ github.base_ref }}:helm/Chart.yaml | grep "^version:" | awk '{print $2}')
          echo "base_version=$BASE_VERSION" >> $GITHUB_OUTPUT
          echo "Base Chart Version: $BASE_VERSION"

      - name: Get PR Chart.yaml version
        id: pr_version
        run: |
          PR_VERSION=$(grep "^version:" helm/Chart.yaml | awk '{print $2}')
          echo "pr_version=$PR_VERSION" >> $GITHUB_OUTPUT
          echo "PR Chart Version: $PR_VERSION"

      - name: Verify chart version bump
        run: |
          BASE_VERSION="${{ steps.base_version.outputs.base_version }}"
          PR_VERSION="${{ steps.pr_version.outputs.pr_version }}"
          
          if [ "$BASE_VERSION" = "$PR_VERSION" ]; then
            echo "⚠️  Warning: Chart version was not bumped"
            echo "   Base: $BASE_VERSION"
            echo "   PR:   $PR_VERSION"
            echo ""
            echo "Please update helm/Chart.yaml version when making changes to the Helm chart."
            exit 1
          fi
          
          echo "✓ Chart version updated from $BASE_VERSION to $PR_VERSION"
