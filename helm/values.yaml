# RCA Operator Helm Chart Values

# Number of replicas for the controller manager
replicaCount: 1

# Controller manager image configuration
image:
  repository: ghcr.io/gaurangkudale/rca-operator
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Install CRDs with the chart
crds:
  install: true

# Service account configuration
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Pod annotations and labels
podAnnotations: {}
podLabels: {}

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Container security context
securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# Controller manager arguments
manager:
  args:
    - --leader-elect
    - --health-probe-bind-address=:8081

# Resources for the controller manager
resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

# Liveness probe configuration
livenessProbe:
  httpGet:
    path: /healthz
    port: 8081
  initialDelaySeconds: 15
  periodSeconds: 20

# Readiness probe configuration
readinessProbe:
  httpGet:
    path: /readyz
    port: 8081
  initialDelaySeconds: 5
  periodSeconds: 10

# Node selector for scheduling
nodeSelector: {}

# Tolerations for scheduling
tolerations: []

# Affinity rules for scheduling
affinity: {}

# Leader election configuration
leaderElection:
  enabled: true

# Metrics service configuration (for Prometheus scraping)
metrics:
  enabled: true
  service:
    port: 8443
    type: ClusterIP

