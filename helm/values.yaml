# RCA Operator Helm Chart Values

# Number of replicas for the controller manager
# Use case: Scale operator control-plane availability and throughput.
replicaCount: 1

# Controller manager image configuration
# Use case: Select which RCA Operator image/version is deployed.
image:
  repository: rca-operator
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Install CRDs with the chart
# Use case: Bootstrap custom resources during install/upgrade when cluster owners allow chart-managed CRDs.
crds:
  install: true
  # Keep CRDs on helm uninstall (prevent deletion of custom resources)
  # Set to false to delete CRDs and all custom resources when chart is uninstalled
  # Default is false to avoid orphaned CRDs and resources, but set to true if cluster owners want to manage CRD lifecycle separately from the chart.
  keep: false

# Service account configuration
# Use case: Control workload identity and API access for the operator pod.
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Pod annotations and labels
# Use case: Attach metadata for policy engines, service meshes, and observability tools.
podAnnotations: {}
podLabels: {}

# Pod security context
# Use case: Enforce pod-level hardening defaults.
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Container security context
# Use case: Enforce container-level least-privilege runtime restrictions.
securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# Controller manager arguments (built from values below; do not set directly)
# Use case: Define core runtime flags for reconciliation, probes, and dashboard endpoint.
manager:
  args:
    - --leader-elect
    - --health-probe-bind-address=:8081
    - --dashboard-bind-address=:9090

# OpenTelemetry configuration
# Use case: Export operator traces/telemetry to an OTLP backend for observability.
otel:
  enabled: false
  # OTLP gRPC collector address (e.g. "signoz-otel-collector.platform:4317")
  endpoint: ""
  serviceName: "rca-operator"
  samplingRate: "1.0"
  insecure: true

# Default RCACorrelationRule CRDs
# Use case: Seed built-in correlation knowledge so RCA works immediately after installation.
defaultRules:
  enabled: false

# Automatic correlation rule detection
# Use case: Learn new recurring incident patterns and create rules automatically.
autoDetect:
  enabled: true
  minOccurrences: 5
  maxRules: 20
  interval: 60s
  expiry: 1h

# Telemetry backend configuration (Phase 2)
# Use case: Connect to external observability backends for cross-signal correlation and topology.
telemetry:
  enabled: false
  # Backend type: "signoz", "jaeger", or "composite"
  backend: ""
  signoz:
    # SigNoz query service URL (e.g. "http://signoz-query-service:8080")
    endpoint: ""
  jaeger:
    # Jaeger query HTTP API URL (e.g. "http://jaeger-query:16686")
    endpoint: ""
  prometheus:
    # Prometheus HTTP API URL (e.g. "http://prometheus:9090")
    endpoint: ""

# Topology visualization configuration (Phase 2)
# Use case: Control service dependency graph refresh frequency and lookback window.
topology:
  refreshInterval: 30s
  dependencyWindow: 15m

# AI-powered root cause analysis (Phase 2)
# Use case: Enable LLM-driven investigation of active incidents.
ai:
  enabled: false
  # OpenAI-compatible API endpoint (e.g. "https://api.openai.com/v1")
  endpoint: ""
  # LLM model name
  model: "gpt-4o"
  # Kubernetes Secret name containing API key (must have key "apiKey")
  secretRef: ""
  # Auto-trigger investigation when incidents become Active
  autoInvestigate: false

# Admission webhooks
# Use case: Validate/default RCA custom resources before they are persisted.
webhooks:
  enabled: false

# Pod Disruption Budget
# Use case: Protect operator availability during voluntary node disruptions.
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Resources for the controller manager
# Use case: Reserve and cap CPU/memory for stable reconciliation performance.
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Liveness probe configuration
# Use case: Restart stuck containers automatically.
livenessProbe:
  httpGet:
    path: /healthz
    port: 8081
  initialDelaySeconds: 15
  periodSeconds: 20

# Readiness probe configuration
# Use case: Route traffic only when the manager is ready to serve.
readinessProbe:
  httpGet:
    path: /readyz
    port: 8081
  initialDelaySeconds: 5
  periodSeconds: 10

# Node selector for scheduling
# Use case: Pin operator pods to specific node pools.
nodeSelector: {}

# Tolerations for scheduling
# Use case: Allow scheduling on tainted nodes when required.
tolerations: []

# Affinity rules for scheduling
# Use case: Control pod placement for reliability and topology goals.
affinity: {}

# Leader election configuration
# Use case: Ensure only one active controller manager reconciles at a time.
leaderElection:
  enabled: true
  # Namespace for the leader election lease object.
  # When empty, controller-runtime auto-detects the in-cluster namespace.
  # Set explicitly if running in a namespace other than the deployment namespace.
  namespace: ""

# Metrics endpoint configuration
# Use case: Expose Prometheus-style metrics for monitoring and alerting.
metrics:
  enabled: true
  service:
    port: 8443
    type: ClusterIP

# Dashboard/Web UI configuration
# Use case: Enable RCA Operator dashboard access for investigation and visualization.
dashboard:
  enabled: true
  port: 9090
  service:
    type: ClusterIP
    port: 9090
    targetPort: 9090
  ingress:
    enabled: false
    className: ""
    annotations: {}
      # kubernetes.io/ingress.class: nginx
      # kubernetes.io/tls-acme: "true"
    hosts:
      - host: rca-operator.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
    #  - secretName: rca-operator-tls
    #    hosts:
    #      - rca-operator.local
