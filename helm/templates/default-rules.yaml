{{- if .Values.defaultRules.enabled }}
apiVersion: rca.rca-operator.tech/v1alpha1
kind: RCACorrelationRule
metadata:
  name: node-plus-eviction
  labels:
    {{- include "rca-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: default-rule
spec:
  priority: 500
  trigger:
    eventType: NodeNotReady
  conditions:
    - eventType: PodEvicted
      scope: sameNode
  fires:
    incidentType: NodeNotReady
    severity: P1
    summary: "NodeNotReady with pod evictions on node {{`{{.NodeName}}`}}"
    resource: node
    scope: Cluster
---
apiVersion: rca.rca-operator.tech/v1alpha1
kind: RCACorrelationRule
metadata:
  name: crashloop-plus-oom
  labels:
    {{- include "rca-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: default-rule
spec:
  priority: 400
  trigger:
    eventType: CrashLoopBackOff
  conditions:
    - eventType: OOMKilled
      scope: samePod
  fires:
    incidentType: OOMKilled
    severity: P2
    summary: "OOMKilled: CrashLoopBackOff with OOMKilled on pod {{`{{.PodName}}`}} in {{`{{.Namespace}}`}}"
---
apiVersion: rca.rca-operator.tech/v1alpha1
kind: RCACorrelationRule
metadata:
  name: crashloop-plus-deploy
  labels:
    {{- include "rca-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: default-rule
spec:
  priority: 300
  trigger:
    eventType: CrashLoopBackOff
  conditions:
    - eventType: StalledRollout
      scope: sameNamespace
  fires:
    incidentType: StalledRollout
    severity: P2
    summary: "StalledRollout: CrashLoopBackOff with stalled rollout in {{`{{.Namespace}}`}}"
    resource: deployment
    scope: Workload
---
apiVersion: rca.rca-operator.tech/v1alpha1
kind: RCACorrelationRule
metadata:
  name: imagepull-no-history
  labels:
    {{- include "rca-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: default-rule
spec:
  priority: 200
  trigger:
    eventType: ImagePullBackOff
  conditions:
    - eventType: PodHealthy
      scope: samePod
      negate: true
  fires:
    incidentType: ImagePullBackOff
    severity: P2
    summary: "ImagePullBackOff: no prior healthy state for pod {{`{{.PodName}}`}} in {{`{{.Namespace}}`}}"
{{- end }}
