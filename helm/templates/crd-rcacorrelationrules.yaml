{{- if .Values.crds.install }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
    {{- if .Values.crds.keep }}
    helm.sh/resource-policy: keep
    {{- end }}
  name: rcacorrelationrules.rca.rca-operator.tech
spec:
  group: rca.rca-operator.tech
  names:
    kind: RCACorrelationRule
    listKind: RCACorrelationRuleList
    plural: rcacorrelationrules
    shortNames:
    - rcr
    singular: rcacorrelationrule
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - description: Evaluation priority
      jsonPath: .spec.priority
      name: Priority
      type: integer
    - description: Trigger event type
      jsonPath: .spec.trigger.eventType
      name: Trigger
      type: string
    - description: Incident type produced
      jsonPath: .spec.fires.incidentType
      name: Fires
      type: string
    - description: Incident severity
      jsonPath: .spec.fires.severity
      name: Severity
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          RCACorrelationRule is a cluster-scoped CRD that defines a declarative
          correlation rule for the RCA Operator rule engine.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              RCACorrelationRuleSpec defines a declarative correlation rule evaluated by the
              generic rule engine. Rules are loaded dynamically — no operator redeploy needed.
            properties:
              agentSelector:
                description: |-
                  agentSelector restricts which RCAAgents this rule applies to.
                  A nil selector matches all agents.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              conditions:
                description: |-
                  conditions are additional signals that must be present in the correlation
                  buffer for the rule to fire. All conditions must match (AND logic).
                items:
                  description: RuleCondition specifies an additional signal that must
                    be present in the buffer.
                  properties:
                    eventType:
                      description: eventType is the signal type that must be present.
                      minLength: 1
                      type: string
                    negate:
                      description: |-
                        negate inverts the condition: when true the rule fires only if this signal
                        is NOT present in the buffer.
                      type: boolean
                    scope:
                      default: samePod
                      description: scope defines the relationship between the trigger
                        event and this condition.
                      enum:
                      - samePod
                      - sameNode
                      - sameNamespace
                      - any
                      type: string
                  required:
                  - eventType
                  - scope
                  type: object
                type: array
              fires:
                description: fires defines the incident properties when this rule
                  matches.
                properties:
                  incidentType:
                    description: incidentType is the canonical incident category.
                    minLength: 1
                    type: string
                  resource:
                    description: |-
                      resource overrides the default resource for incident dedup.
                      Use "node" for node-scoped, "deployment" for deployment-scoped, or leave empty for pod-scoped.
                    type: string
                  scope:
                    description: scope overrides the incident scope level.
                    enum:
                    - Pod
                    - Workload
                    - Namespace
                    - Cluster
                    type: string
                  severity:
                    description: severity is the incident priority level.
                    enum:
                    - P1
                    - P2
                    - P3
                    - P4
                    type: string
                  summary:
                    description: |-
                      summary is a Go text/template rendered with event context.
                      Available variables: {{.PodName}}, {{.Namespace}}, {{.NodeName}}, {{.EventType}}.
                    minLength: 1
                    type: string
                required:
                - incidentType
                - severity
                - summary
                type: object
              priority:
                default: 100
                description: |-
                  priority controls evaluation order. Higher values are evaluated first.
                  The first rule whose conditions match wins.
                minimum: 1
                type: integer
              trigger:
                description: trigger is the event type that initiates rule evaluation.
                properties:
                  eventType:
                    description: eventType is one of the watcher EventType constants
                      (e.g. CrashLoopBackOff, OOMKilled).
                    minLength: 1
                    type: string
                required:
                - eventType
                type: object
            required:
            - fires
            - priority
            - trigger
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources: {}

{{- end }}
