{{- if .Values.crds.install }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
    {{- if .Values.crds.keep }}
    helm.sh/resource-policy: keep
    {{- end }}
  name: incidentreports.rca.rca-operator.tech
spec:
  group: rca.rca-operator.tech
  names:
    kind: IncidentReport
    listKind: IncidentReportList
    plural: incidentreports
    singular: incidentreport
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Incident severity
      jsonPath: .status.severity
      name: Severity
      type: string
    - description: Lifecycle phase
      jsonPath: .status.phase
      name: Phase
      type: string
    - description: Incident type
      jsonPath: .spec.incidentType
      name: Type
      type: string
    - description: Notifications sent
      jsonPath: .status.notified
      name: Notified
      type: boolean
    - description: When first observed
      jsonPath: .status.firstObservedAt
      name: FirstSeen
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: IncidentReport is the Schema for the incidentreports API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of IncidentReport
            properties:
              agentRef:
                description: agentRef is the name of the RCAAgent that created this
                  report.
                minLength: 1
                type: string
              fingerprint:
                description: |-
                  fingerprint is the canonical identity for an incident.
                  It is stable across repeated signals for the same underlying issue.
                minLength: 1
                type: string
              incidentType:
                description: incidentType is the durable incident category.
                minLength: 1
                type: string
              scope:
                description: scope describes the primary object or workload the incident
                  belongs to.
                properties:
                  level:
                    description: level is one of Cluster, Namespace, Workload, or
                      Pod.
                    enum:
                    - Cluster
                    - Namespace
                    - Workload
                    - Pod
                    type: string
                  namespace:
                    description: namespace is populated for namespace-, workload-,
                      and pod-scoped incidents.
                    type: string
                  resourceRef:
                    description: resourceRef points at the primary affected object.
                    properties:
                      apiVersion:
                        description: apiVersion is the resource API version.
                        type: string
                      kind:
                        description: kind is the Kubernetes kind.
                        type: string
                      name:
                        description: name is the Kubernetes object name.
                        type: string
                      namespace:
                        description: namespace is empty for cluster-scoped resources.
                        type: string
                      uid:
                        description: uid is the Kubernetes UID when known.
                        type: string
                    required:
                    - kind
                    - name
                    type: object
                  workloadRef:
                    description: workloadRef points at the top-level workload when
                      the issue belongs to one.
                    properties:
                      apiVersion:
                        description: apiVersion is the resource API version.
                        type: string
                      kind:
                        description: kind is the Kubernetes kind.
                        type: string
                      name:
                        description: name is the Kubernetes object name.
                        type: string
                      namespace:
                        description: namespace is empty for cluster-scoped resources.
                        type: string
                      uid:
                        description: uid is the Kubernetes UID when known.
                        type: string
                    required:
                    - kind
                    - name
                    type: object
                type: object
            required:
            - agentRef
            - fingerprint
            - incidentType
            type: object
          status:
            description: status defines the observed state of IncidentReport
            properties:
              activeAt:
                description: activeAt is when the incident crossed the stabilization
                  window and became Active.
                format: date-time
                type: string
              affectedResources:
                description: affectedResources lists the Kubernetes resources involved
                  in this incident.
                items:
                  description: AffectedResource identifies a Kubernetes resource involved
                    in an incident.
                  properties:
                    apiVersion:
                      description: apiVersion is the resource API version when known.
                      type: string
                    kind:
                      description: kind is the resource kind (e.g. Deployment, Pod,
                        Node).
                      type: string
                    name:
                      description: name is the resource name.
                      type: string
                    namespace:
                      description: namespace is the resource namespace. Empty for
                        cluster-scoped resources.
                      type: string
                    uid:
                      description: uid is the Kubernetes UID when known.
                      type: string
                  required:
                  - kind
                  - name
                  type: object
                type: array
                x-kubernetes-list-type: atomic
              blastRadius:
                description: blastRadius lists downstream services impacted by this
                  incident.
                items:
                  type: string
                type: array
                x-kubernetes-list-type: atomic
              conditions:
                description: conditions represent the current state of the IncidentReport
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              correlatedSignals:
                description: |-
                  correlatedSignals is the list of raw signals that triggered this incident
                  (e.g. "CrashLoopBackOff (restarts: 8)", "OOMKilled (exit code 137)").
                items:
                  type: string
                type: array
                x-kubernetes-list-type: atomic
              firstObservedAt:
                description: firstObservedAt is when the incident fingerprint was
                  first seen in the current lifecycle.
                format: date-time
                type: string
              incidentType:
                description: |-
                  incidentType is the category of incident detected by the incident engine.
                  The value is self-describing from the raw event type (e.g. CrashLoopBackOff,
                  OOMKilled, ImagePullBackOff, NodeNotReady) rather than a fixed enum.
                type: string
              lastObservedAt:
                description: lastObservedAt is when the most recent confirming signal
                  was received.
                format: date-time
                type: string
              message:
                description: message is the detailed message for the most recent signal.
                type: string
              notified:
                description: |-
                  notified indicates whether the notification layer (Slack / PagerDuty) has
                  already fired for this incident. Used to suppress duplicate alerts.
                type: boolean
              phase:
                description: phase is the current lifecycle phase of the incident.
                enum:
                - Detecting
                - Active
                - Resolved
                type: string
              rca:
                description: rca holds AI-generated root cause analysis results.
                properties:
                  confidence:
                    description: confidence is the AI's confidence level (0.0-1.0).
                    type: string
                  evidence:
                    description: evidence lists the telemetry evidence the AI used.
                    items:
                      type: string
                    type: array
                    x-kubernetes-list-type: atomic
                  investigatedAt:
                    description: investigatedAt is when the AI investigation was performed.
                    format: date-time
                    type: string
                  playbook:
                    description: playbook is a list of suggested remediation steps.
                    items:
                      type: string
                    type: array
                    x-kubernetes-list-type: atomic
                  rootCause:
                    description: rootCause is the AI-determined root cause summary.
                    type: string
                type: object
              reason:
                description: reason is the machine-oriented Kubernetes reason when
                  available.
                type: string
              relatedTraces:
                description: relatedTraces lists W3C trace IDs correlated with this
                  incident.
                items:
                  type: string
                type: array
                x-kubernetes-list-type: atomic
              resolvedAt:
                description: resolvedAt is when the incident was resolved.
                format: date-time
                type: string
              resolvedTime:
                description: |-
                  resolvedTime is when the incident was resolved. Empty while still active.
                  Deprecated: use resolvedAt. Retained only for compatibility with older clients.
                format: date-time
                type: string
              severity:
                description: severity is the incident severity level assigned by the
                  incident engine.
                enum:
                - P1
                - P2
                - P3
                - P4
                type: string
              signalCount:
                description: signalCount is the number of confirming signals recorded
                  in the current lifecycle.
                format: int64
                type: integer
              stabilizationWindowSeconds:
                description: stabilizationWindowSeconds is the required continuous
                  observation window before Active.
                format: int64
                type: integer
              startTime:
                description: |-
                  startTime is when the incident was first detected.
                  Deprecated: use firstObservedAt. Retained only for compatibility with older clients.
                format: date-time
                type: string
              summary:
                description: summary is the short dashboard-friendly summary for the
                  current incident state.
                type: string
              timeline:
                description: timeline is the ordered sequence of events that make
                  up this incident.
                items:
                  description: TimelineEvent is a single timestamped entry in the
                    incident timeline.
                  properties:
                    event:
                      description: event is a human-readable description of what happened.
                      type: string
                    time:
                      description: time is the wall-clock time of the event (RFC3339).
                      format: date-time
                      type: string
                  required:
                  - event
                  - time
                  type: object
                type: array
                x-kubernetes-list-type: atomic
            required:
            - affectedResources
            - correlatedSignals
            - incidentType
            - phase
            - severity
            - startTime
            - timeline
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}

{{- end }}
