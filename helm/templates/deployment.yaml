apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rca-operator.fullname" . }}-controller-manager
  namespace: {{ include "rca-operator.namespace" . }}
  labels:
    {{- include "rca-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "rca-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "rca-operator.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "rca-operator.serviceAccountName" . }}
      terminationGracePeriodSeconds: 10
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: manager
          command:
            - /manager
          args:
            {{- toYaml .Values.manager.args | nindent 12 }}
            {{- if .Values.webhooks.enabled }}
            - --enable-webhooks=true
            {{- end }}
            {{- if .Values.leaderElection.namespace }}
            - --leader-election-namespace={{ .Values.leaderElection.namespace }}
            {{- end }}
            {{- if .Values.autoDetect.enabled }}
            - --enable-autodetect=true
            - --autodetect-min-occurrences={{ .Values.autoDetect.minOccurrences }}
            - --autodetect-max-rules={{ .Values.autoDetect.maxRules }}
            - --autodetect-interval={{ .Values.autoDetect.interval }}
            - --autodetect-expiry={{ .Values.autoDetect.expiry }}
            {{- end }}
            {{- if .Values.telemetry.enabled }}
            - --telemetry-backend={{ .Values.telemetry.backend }}
            {{- if .Values.telemetry.signoz.endpoint }}
            - --signoz-endpoint={{ .Values.telemetry.signoz.endpoint }}
            {{- end }}
            {{- if .Values.telemetry.jaeger.endpoint }}
            - --jaeger-endpoint={{ .Values.telemetry.jaeger.endpoint }}
            {{- end }}
            {{- if .Values.telemetry.prometheus.endpoint }}
            - --prometheus-endpoint={{ .Values.telemetry.prometheus.endpoint }}
            {{- end }}
            {{- end }}
            {{- if .Values.topology.refreshInterval }}
            - --topology-refresh-interval={{ .Values.topology.refreshInterval }}
            {{- end }}
            {{- if .Values.topology.dependencyWindow }}
            - --topology-dependency-window={{ .Values.topology.dependencyWindow }}
            {{- end }}
            {{- if .Values.ai.enabled }}
            - --ai-endpoint={{ .Values.ai.endpoint }}
            - --ai-model={{ .Values.ai.model }}
            {{- if .Values.ai.secretRef }}
            - --ai-secret-ref={{ .Values.ai.secretRef }}
            {{- end }}
            {{- if .Values.ai.autoInvestigate }}
            - --ai-auto-investigate=true
            {{- end }}
            {{- end }}
          env:
            {{- if .Values.otel.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.endpoint | quote }}
            {{- end }}
            {{- if and .Values.ai.enabled .Values.ai.secretRef }}
            - name: RCA_AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.ai.secretRef }}
                  key: apiKey
            {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: health
              containerPort: 8081
              protocol: TCP
            {{- if .Values.dashboard.enabled }}
            - name: dashboard
              containerPort: {{ .Values.dashboard.port }}
              protocol: TCP
            {{- end }}
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.metrics.service.port }}
              protocol: TCP
            {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
